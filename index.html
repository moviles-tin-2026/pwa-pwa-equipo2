<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PyME-Sync | Ventas</title>
    <meta name="description" content="PWA responsiva para gestión de ventas e inventario." />
    <meta name="theme-color" content="#4b1504" />

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="img/icon512.png" />
    <link rel="apple-touch-icon" href="img/icon512.png" />

    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <header class="top-bar">
        <div class="brand">
            <div class="brand-icon">▰</div>
            <div>
                <h1>PyME-Sync</h1>
                <p>Módulo de ventas</p>
            </div>
        </div>

        <div class="top-actions">
            <button id="installBtn" class="install-btn hidden">Instalar app</button>
            <button id="focusSearch" class="icon-btn" aria-label="Buscar">⌕</button>
            <button id="userBtn" class="icon-btn" aria-label="Usuario">♙</button>
        </div>
    </header>

    <main class="layout">
        <section class="products-panel">
            <div class="panel-title">
                <div>
                    <h2>Productos</h2>
                    <p>Selecciona productos para agregarlos a la venta.</p>
                </div>
                <strong id="productCounter">0 productos</strong>
            </div>

            <div class="search-box">
                <span>⌕</span>
                <input id="searchInput" type="search" placeholder="Buscar producto por nombre, SKU o categoría..." />
            </div>

            <div class="filters">
                <button class="filter-main" id="categoryBtn">
                    <span>▼</span>
                    <span id="categoryLabel">Todas</span>
                </button>

                <button class="filter-icon" id="scanBtn" aria-label="Escanear código">▥</button>
            </div>

            <div class="category-menu hidden" id="categoryMenu"></div>

            <section class="product-grid" id="productGrid"></section>
        </section>

        <aside class="sale-panel">
            <section class="sale-card">
                <div class="sale-header">
                    <div>
                        <span class="cart-icon">🛒</span>
                        <h2>Venta actual</h2>
                    </div>

                    <button class="trash" id="clearSaleBtn" aria-label="Vaciar venta">🗑</button>
                </div>

                <div id="saleItems" class="sale-items"></div>

                <div class="summary">
                    <div>
                        <span>Subtotal</span>
                        <strong id="subtotalText">$0.00</strong>
                    </div>

                    <div>
                        <span>IVA (15%)</span>
                        <strong id="taxText">$0.00</strong>
                    </div>

                    <div class="total">
                        <span>Total</span>
                        <strong id="totalText">$0.00</strong>
                    </div>
                </div>

                <button class="complete-sale" id="completeSaleBtn">
                    ✓ Completar venta
                </button>

                <p class="message" id="messageBox"></p>
            </section>

            <section class="history-card">
                <div class="section-title">
                    <h2>Ventas recientes</h2>
                    <button id="clearHistoryBtn">Limpiar</button>
                </div>

                <div id="salesHistory" class="sales-history"></div>
            </section>
        </aside>
    </main>

    <nav class="bottom-nav">
        <button data-view="home">▦<span>Home</span></button>
        <button data-view="stock">▰<span>Stock</span></button>
        <button data-view="sales" class="active">🛒<span>Ventas</span></button>
        <button data-view="charts">▥<span>Charts</span></button>
        <button data-view="admin">⚙<span>Admin</span></button>
    </nav>

    <script src="js/app.js"></script>
</body>

</html>
